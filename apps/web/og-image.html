<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;800&display=block" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        box-sizing: border-box;
      }

      body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', system-ui, sans-serif;
        background:
          radial-gradient(ellipse 90% 60% at 50% -10%, rgb(88 166 255 / 0.16), transparent 70%),
          radial-gradient(ellipse 60% 40% at 85% 0%, rgb(188 140 255 / 0.12), transparent 70%), #0d1117;
      }

      .grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgb(110 118 129 / 0.14) 1px, transparent 1px),
          linear-gradient(90deg, rgb(110 118 129 / 0.14) 1px, transparent 1px);
        background-size: 36px 36px;
        mask-image: radial-gradient(ellipse 75% 90% at 50% 0%, black 25%, transparent 78%);
        -webkit-mask-image: radial-gradient(ellipse 75% 90% at 50% 0%, black 25%, transparent 78%);
      }

      .grid-coarse {
        background-image:
          linear-gradient(rgb(110 118 129 / 0.2) 1px, transparent 1px),
          linear-gradient(90deg, rgb(110 118 129 / 0.2) 1px, transparent 1px);
        background-size: 180px 180px;
      }

      .content {
        position: relative;
        text-align: center;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 12px 26px;
        border: 1px solid rgb(88 166 255 / 0.3);
        border-radius: 999px;
        background: rgb(88 166 255 / 0.1);
        color: #58a6ff;
        font-size: 23px;
        font-weight: 500;
        margin-bottom: 44px;
      }

      .wordmark {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 24px;
        margin-bottom: 32px;
      }

      .wordmark svg {
        width: 96px;
        height: 96px;
        margin-top: 10px;
      }

      .wordmark h1 {
        font-size: 148px;
        font-weight: 800;
        letter-spacing: -0.04em;
        background-image: linear-gradient(120deg, #f0f6fc 25%, #58a6ff 65%, #bc8cff 95%);
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        padding-right: 8px;
      }

      .tagline {
        font-size: 46px;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: #f0f6fc;
      }

      .domain {
        position: absolute;
        bottom: 38px;
        left: 0;
        width: 100%;
        text-align: center;
        color: #8b949e;
        font-size: 25px;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="grid"></div>
    <div class="grid grid-coarse"></div>
    <div class="content">
      <div class="badge">Private AI agents for mid-sized businesses</div>
      <div class="wordmark">
        <svg fill="#58a6ff" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
        </svg>
        <h1>Zyplux</h1>
      </div>
      <div class="tagline">Neural Intelligence Systems</div>
    </div>
    <div class="domain">zyplux.ai</div>
  </body>
</html>
